spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:

#          discovery:
#            locator:
#              enabled: true
#              lower-case-service-id: true

          routes:
            - id: users-status-check
              uri: lb://users-ws
              predicates:
                - Path=/users-ws/users/status/check
                - Method=GET
                - Header=Authorization, Bearer (.*)
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/users-ws/(?<segment>.*), /$\{segment}
                - AuthorizationHeaderFilter

            - id: users-h2-console
              uri: lb://users-ws
              predicates:
                - Path=/users-ws/h2-console
                - Method=GET
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/users-ws/(?<segment>.*), /$\{segment}

            - id: users-create
              uri: lb://users-ws
              predicates:
                - Path=/users-ws/users
                - Method=POST
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/users-ws/(?<segment>.*), /$\{segment}

            - id: users-login
              uri: lb://users-ws
              predicates:
                - Path=/users-ws/users/login
                - Method=POST
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/users-ws/(?<segment>.*), /$\{segment}

            - id: users-get-update-delete
              uri: lb://users-ws
              predicates:
                - Path=/users-ws/users/**
                - Method=GET, PUT, DELETE
                - Header=Authorization, Bearer (.*)
              filters:
                - RemoveRequestHeader=Cookie
                - RewritePath=/users-ws/(?<segment>.*), /$\{segment}
                - AuthorizationHeaderFilter

eureka:
  serviceUrl:
    defaultZone: http://localhost:8761/eureka/

server:
  port: 8888

api:
  registration:
    url: "/users-ws/users"
  login:
    url: "/users-ws/users/login"
  h2-console:
    url: "/users-ws/h2-console"
