spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            - id: users-status-check
              uri: lb://users-ws
              predicates:
                - Path=/users/status/check
                - Method=GET
              filters:
                - RemoveRequestHeader=Cookie
#                - RewritePath=/users-ws/(?<segment>.*), /$\{segment}

            - id: users-h2-console
              uri: lb://users-ws
              predicates:
                - Path=/users/h2-console
                - Method=GET
              filters:
                - RemoveRequestHeader=Cookie

            - id: users-create
              uri: lb://users-ws
              predicates:
                - Path=/users
                - Method=POST
              filters:
                - RemoveRequestHeader=Cookie

eureka:
  serviceUrl:
    defaultZone: http://localhost:8761/eureka/

server:
  port: 8888